{% if total_pages > 1 %}
  <nav class="pagination">
    {% set prev_page = page - 1 %}
    {% set next_page = page + 1 %}
    {% if page > 1 %}
      <a
        class="button"
        href="/markets/stocks?q={{ encoded_query_string }}&exchange={{ exchange }}&sort={{ sort }}&page={{ prev_page }}&page_size={{ page_size }}"
        hx-get="/markets/stocks?q={{ encoded_query_string }}&exchange={{ exchange }}&sort={{ sort }}&page={{ prev_page }}&page_size={{ page_size }}"
        hx-target="#stock-list-panel"
        hx-push-url="true"
      >
        上一页
      </a>
    {% endif %}
    <span class="pagination-label">第 {{ page }} / {{ total_pages }} 页</span>
    {% if page < total_pages %}
      <a
        class="button"
        href="/markets/stocks?q={{ encoded_query_string }}&exchange={{ exchange }}&sort={{ sort }}&page={{ next_page }}&page_size={{ page_size }}"
        hx-get="/markets/stocks?q={{ encoded_query_string }}&exchange={{ exchange }}&sort={{ sort }}&page={{ next_page }}&page_size={{ page_size }}"
        hx-target="#stock-list-panel"
        hx-push-url="true"
      >
        下一页
      </a>
    {% endif %}
  </nav>
{% endif %}
